unbind C-b
set -g prefix C-s
# set -g mode-mouse on
# set -g mouse-resize-pane on
set-option -g mouse on
# Prefer the invoking login shell (Homebrew zsh on macOS, WSL zsh, etc.)
# run-shell expands $SHELL from the environment; plain set -g default-shell $SHELL does not.
run-shell 'tmux set-option -g default-shell "${SHELL:-/bin/zsh}"'
# set-option -g default-terminal "screen-256color"
set-option -g history-limit 30000
set-option -g renumber-windows on
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",alacritty:Tc"
set -ga terminal-overrides ",xterm-ghostty:Tc"
# Truecolor / RGB for apps inside tmux (Grok, nvim, etc.)
set -as terminal-features ",*:RGB"

# --- Extended / modified keys (Ctrl+., Shift+Enter, Ctrl+Enter, …) ---
# Grok (and other modern TUIs) need CSI-u sequences for keys that have no
# classic control-character encoding (Ctrl+., Ctrl+;, Ctrl+Enter, Shift+Enter).
# Use "always" so mode 1 is forced even when the app negotiates Kitty protocol
# (which tmux does not fully speak): classic Ctrl+letter stays as ^X, and only
# keys without a well-known representation are upgraded to CSI-u.
#
# Ghostty + Alacritty can emit these; macOS Terminal.app and many Windows
# Terminal profiles still use classic encodings (Ctrl+. may not work there).
set -g extended-keys always
set -g extended-keys-format csi-u

# Tell tmux the *outer* terminal can send/receive extended keys.
# Ghostty TERM=xterm-ghostty; Alacritty TERM=alacritty; Terminal.app /
# Windows Terminal often TERM=xterm-256color.
# Without extkeys on the client termname, tmux will not request extended keys
# from the emulator and Ctrl+. / modified Enter never reach the pane.
set -as terminal-features ',xterm-ghostty:extkeys'
set -as terminal-features ',*ghostty*:extkeys'
set -as terminal-features ',*alacritty*:extkeys'
set -as terminal-features ',xterm-256color:extkeys'
set -as terminal-features ',xterm*:extkeys'

# Clipboard + OSC 52 / notification passthrough (recommended by Grok /terminal-setup)
set -g set-clipboard on
set -g allow-passthrough on

# Explicit CSI-u fallbacks for Grok chords that have no classic control byte.
# If Ghostty delivers these as bindable keys, tmux forwards the sequence apps expect.
# (Also pair with Ghostty keybinds that emit the same sequences — belt and suspenders.)
bind-key -n S-Enter  send-keys Escape "[13;2u"
bind-key -n C-Enter  send-keys Escape "[13;5u"
bind-key -n C-.      send-keys Escape "[46;5u"
bind-key -n C-,      send-keys Escape "[44;5u"
bind-key -n C-\;     send-keys Escape "[59;5u"
bind-key -n C-\'     send-keys Escape "[39;5u"

# Open new splits and windows in the same directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

## toggle mouse mode
bind-key m set -g mouse on \; display "Mouse ON"
bind-key M set -g mouse off \; display "Mouse OFF"

set-option -g status-left-length 50
set-option -s escape-time 00

set-option -g focus-events on

# set -g pane-border-fg colour0
# set -g pane-active-border-fg colour1
set -g status-bg black
set -g status-fg white

# set -g window-style 'fg=black,bg=white'
# set -g window-active-style 'fg=black,bg=white'

unbind C-l

bind -r C-j resize-pane -D 20
bind -r C-k resize-pane -U 20
bind -r C-h resize-pane -L 20
bind -r C-l resize-pane -R 20
bind -r P paste-buffer
setw -g mode-keys vi

#PLUGINS
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sessionist'

set -g @vim_navigator_prefix_mapping_clear_screen ""

run '~/.tmux/plugins/tpm/tpm'

# --- After TPM: smart pane switching (vim-tmux-navigator) ---
# C-h/j/k/l: only vim/nvim/fzf — always pane-nav when Grok is focused.
# C-\: also pass through to Grok (last-pane toggle is less useful there).
# Grok alts for hjkl: PgUp/PgDn / mouse; extensions: /plugins or Ctrl+P
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?(g?\\.?(view|l?n?vim?x?)(diff)?(-wrapped)?|fzf)'"
is_vim_or_grok="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?(g?\\.?(view|l?n?vim?x?)(diff)?(-wrapped)?|fzf|grok)'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind-key -n C-\\ if-shell "$is_vim_or_grok" "send-keys 'C-\\'" "select-pane -l"

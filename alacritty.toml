# Shared Alacritty config (TOML; Alacritty >= 0.13).
# Install:
#   macOS/Linux/WSL guest (if you run Alacritty inside Linux): ~/.config/alacritty/alacritty.toml
#   Windows host: %APPDATA%\alacritty\alacritty.toml  (see alacritty.windows.toml for shell)

[general]
# On Windows host, create/import OS-specific shell overrides, e.g.:
# import = ["alacritty.windows.toml"]
live_config_reload = true

[colors]
draw_bold_text_with_bright_colors = true

[colors.bright]
black = "#bcbcbc"
blue = "#0087af"
cyan = "#005f87"
green = "#008700"
magenta = "#8700af"
red = "#af0000"
white = "#eeeeee"
yellow = "#ffff1e"

[colors.cursor]
cursor = "#444444"
text = "#eeeeee"

[colors.normal]
black = "#222222"
blue = "#0087af"
cyan = "#005f87"
green = "#008700"
magenta = "#8700af"
red = "#af0000"
white = "#ffffff"
yellow = "#afaf08"

[colors.primary]
background = "#eeeeee"
foreground = "#000000"

[env]
# Do not force TERM=alacritty here: WSL/remote hosts often lack that terminfo
# entry and break with "unknown terminal type". Alacritty sets TERM itself when
# its terminfo is installed; COLORTERM is enough for truecolor-aware apps.
COLORTERM = "truecolor"

[font]
size = 12.0

[font.bold]
family = "Iosevka Term"

[font.bold_italic]
family = "Iosevka Term"

[font.italic]
family = "Iosevka Term"
style = "Italic"

[font.normal]
family = "Iosevka Term"

[font.offset]
x = 0
y = 1

# Shell intentionally omitted on Unix so the login shell is used
# (Homebrew zsh on macOS, distro zsh on Linux). On Windows host → WSL,
# import alacritty.windows.toml or set [terminal.shell] there.

[window]
dynamic_padding = true
dynamic_title = true
# "Maximized" is fine on desktop Linux/Windows; on macOS it still works.
startup_mode = "Maximized"
title = "Alacritty"

[window.padding]
x = 4
y = 4

[keyboard]
# CSI-u for Grok / modern TUIs (pairs with tmux extended-keys-format csi-u).
# Alacritty does not speak Kitty keyboard protocol the same way as Ghostty;
# these bindings force the same fixterm sequences.
bindings = [
  { key = "Enter", mods = "Shift", chars = "\u001b[13;2u" },
  { key = "Enter", mods = "Control", chars = "\u001b[13;5u" },
  { key = "Period", mods = "Control", chars = "\u001b[46;5u" },
  { key = "Comma", mods = "Control", chars = "\u001b[44;5u" },
  { key = "Semicolon", mods = "Control", chars = "\u001b[59;5u" },
  { key = "Apostrophe", mods = "Control", chars = "\u001b[39;5u" },
]
